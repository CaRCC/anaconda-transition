name: release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            latexmk \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            tex-gyre

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Build PDF with Sphinx
        working-directory: docs
        run: uvx --from sphinx-rtd-theme --with sphinx make latexpdf

      - name: Generate release filename
        id: filename
        run: |
          # Strip 'v' prefix from tag (v1.0 -> 1.0)
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "release_name=carcc-anaconda-transition-${VERSION}.pdf" >> "$GITHUB_OUTPUT"

      - name: Copy PDF to release name
        run: cp docs/_build/latex/carcc-anaconda-transition.pdf "${{ steps.filename.outputs.release_name }}"

      - name: Upload PDF as release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.filename.outputs.release_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
